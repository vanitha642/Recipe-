<!DOCTYPE html>
<html>
<head>
    <title>Recipe Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-page">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter Username"><br>
        <input type="password" id="password" placeholder="Enter Password"><br>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- HOME PAGE -->
<div id="homePage" style="display:none;">

    <!-- TOP BAR -->
    <div class="topbar">
        <span class="menu" onclick="toggleMenu()">☰</span>
        <h2>🍲 My Recipes</h2>
        <div class="profile">👤</div>
    </div>

    <!-- SIDE NAVBAR -->
    <div id="sidebar" class="sidebar">
        <a href="#" onclick="filterRecipes('all')">All</a>
        <a href="#" onclick="filterRecipes('breakfast')">Breakfast</a>
        <a href="#" onclick="filterRecipes('lunch')">Lunch</a>
        <a href="#" onclick="filterRecipes('dinner')">Dinner</a>
        <a href="#" onclick="filterRecipes('snacks')">Snacks</a>
    </div>

    <!-- WELCOME -->
    <div class="welcome">
        <h1>Welcome to My Recipe Website</h1>
    </div>

    <!-- RECIPES -->
    <div class="recipes">
        <div class="recipe-card breakfast">Idli</div>
        <div class="recipe-card lunch">Meals</div>
        <div class="recipe-card dinner">Dosa</div>
        <div class="recipe-card snacks">Samosa</div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
