<!DOCTYPE html>
<html>
<head>
    <title>Recipe Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage" class="login-page">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter Username"><br>
        <input type="password" id="password" placeholder="Enter Password"><br>
        <button onclick="login()">Login</button>

        <p onclick="showSignup()">Sign Up</p>
        <p onclick="forgotPassword()">Forgot Password?</p>
    </div>
</div>

<div id="signupPage" class="login-page" style="display:none;">
    <div class="login-box">
        <h2>Sign Up</h2>
        <input type="text" id="newUser"><br>
        <input type="password" id="newPass"><br>
        <button onclick="signup()">Sign Up</button>

        <p onclick="showLogin()">Back to Login</p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
